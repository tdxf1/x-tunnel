name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Test
        run: go test ./...

      - name: Coverage
        run: go test -cover ./...

      - name: Build
        run: go build -o x-tunnel .

      - name: Build script smoke
        run: |
          OUT=/tmp/x-tunnel-ci VERSION=ci COMMIT="${GITHUB_SHA:-local}" BUILD_DATE=ci ./scripts/build.sh
          /tmp/x-tunnel-ci -version

      - name: Release script smoke
        run: |
          TARGETS="linux/amd64" DIST=/tmp/x-tunnel-dist VERSION=ci COMMIT="${GITHUB_SHA:-local}" BUILD_DATE=ci ./scripts/release.sh
          test -s /tmp/x-tunnel-dist/SHA256SUMS
