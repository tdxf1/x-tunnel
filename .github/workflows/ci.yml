name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.4"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Format check
        run: |
          test -z "$(gofmt -l ./cmd ./internal)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -count=1 -timeout=2m ./...

      - name: Coverage
        run: go test -cover -count=1 -timeout=2m ./...

      - name: Race
        run: go test -race -count=1 -timeout=3m ./...

      - name: Fuzz protocol hello smoke
        run: go test -run '^$' -fuzz FuzzReadProtocolHello -fuzztime=2s -parallel=1 ./internal/app

      - name: Fuzz SOCKS5 UDP smoke
        run: go test -run '^$' -fuzz FuzzParseSOCKS5UDPPacket -fuzztime=2s -parallel=1 ./internal/app

      - name: Build
        run: go build -o x-tunnel ./cmd/x-tunnel

      - name: Build script smoke
        run: |
          OUT=/tmp/x-tunnel-ci VERSION=ci COMMIT="${GITHUB_SHA:-local}" BUILD_DATE=ci ./scripts/build.sh
          /tmp/x-tunnel-ci -version

      - name: Release script smoke
        run: |
          TARGETS="linux/amd64" DIST=/tmp/x-tunnel-dist VERSION=ci COMMIT="${GITHUB_SHA:-local}" BUILD_DATE=ci ./scripts/release.sh
          test -s /tmp/x-tunnel-dist/SHA256SUMS
